<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简翻译 · 紫调 · Supabase</title>
    <!-- 极简风格, 紫色调 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f5f0ff 0%, #ede9fe 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px -12px rgba(106, 13, 173, 0.25), 0 8px 24px -6px rgba(128, 0, 255, 0.15);
            padding: 2rem 2rem 2.5rem;
            max-width: 700px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 550;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #5b21b6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .subhead {
            color: #6d4a9e;
            font-weight: 400;
            margin-bottom: 1.8rem;
            border-left: 4px solid #c4b5fd;
            padding-left: 1rem;
            font-size: 1rem;
        }
        .user-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.5);
            border-radius: 100px;
            padding: 0.5rem 0.5rem 0.5rem 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #e0d5fc;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.95rem;
            color: #3b2b5c;
            font-weight: 500;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 40px;
            background: #d8c9fc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4c1d95;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 2px 8px #b6a0e5;
        }
        .badge {
            background: #8b5cf6;
            color: white;
            border-radius: 40px;
            padding: 0.2rem 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            box-shadow: 0 2px 6px #a78bfa;
        }
        .badge.pro {
            background: #a78bfa;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
        }
        .btn {
            border: none;
            background: white;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 550;
            font-size: 0.9rem;
            box-shadow: 0 4px 8px rgba(139, 92, 246, 0.2);
            color: #4c1d95;
            border: 1px solid #e2d5ff;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #7c3aed;
            color: white;
            border: none;
            box-shadow: 0 6px 14px #b49aff;
        }
        .btn-primary:hover {
            background: #6d28d9;
            transform: scale(0.98);
            box-shadow: 0 4px 12px #a78bfa;
        }
        .btn-google {
            background: white;
            border: 1px solid #dad1ff;
        }
        .btn-google:hover {
            background: #f5efff;
            border-color: #b69eff;
        }
        .counter-panel {
            background: rgba(237, 233, 254, 0.5);
            border-radius: 1.8rem;
            padding: 1.8rem 1.5rem;
            margin: 1.5rem 0 2rem;
            border: 1px solid white;
            box-shadow: inset 0 1px 4px #ffffff, 0 6px 12px #e1d4ff;
        }
        .translation-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        textarea {
            width: 100%;
            border-radius: 1.4rem;
            border: 2px solid #e1d5fa;
            background: rgba(255, 255, 255, 0.7);
            padding: 1rem 1.5rem;
            font-size: 1rem;
            resize: vertical;
            outline: none;
            transition: 0.15s;
            color: #281a45;
        }
        textarea:focus {
            border-color: #b69eff;
            box-shadow: 0 0 0 4px #e4d7ff;
        }
        .translate-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .translate-btn {
            background: #8b5cf6;
            border: none;
            padding: 0.8rem 2.2rem;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 6px 14px #bba5ff;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid #aa8cff;
        }
        .translate-btn:active {
            transform: scale(0.96);
        }
        .translate-btn.disabled, .translate-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            background: #b8a5dd;
            box-shadow: none;
        }
        .trial-badge {
            background: #ede9fe;
            padding: 0.4rem 1rem;
            border-radius: 60px;
            font-size: 0.9rem;
            color: #4c2a7a;
            font-weight: 500;
            border: 1px dashed #b69eff;
        }
        .output-area {
            background: rgba(255,255,255,0.5);
            border-radius: 1.4rem;
            padding: 1.5rem;
            margin-top: 1.2rem;
            border: 1px solid #ede5ff;
            min-height: 100px;
            color: #2e1e4a;
            font-size: 1.1rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .footer-note {
            text-align: right;
            font-size: 0.8rem;
            color: #ab93d6;
            margin-top: 1.2rem;
        }
        .error-message {
            color: #c5486b;
            font-size: 0.9rem;
            padding: 0.3rem 1rem;
            background: #ffe2ec;
            border-radius: 60px;
            display: inline-block;
        }
    </style>
    <!-- 通过 CDN 引入 Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="glass-card">
    <div style="display: flex; align-items: center; justify-content: space-between;">
        <h1>✨ 紫译 · aiko</h1>
        <div class="badge">Supabase ✦ 极简</div>
    </div>
    <div class="subhead">用 Google 登录解锁 Pro 无限翻译 · 未登录限3次</div>

    <!-- 用户信息区域 / 登录按钮 -->
    <div class="user-section" id="userSection">
        <!-- 动态由 js 填充 -->
        <div class="user-info" id="userInfoPlaceholder">
            <span class="avatar">⚡</span>
            <span>加载中...</span>
        </div>
        <button class="btn btn-google" id="googleSignInBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.283 10.356h-8.327v3.451h4.792c-.446 2.193-2.313 3.451-4.792 3.451a5.274 5.274 0 0 1-5.285-5.258 5.274 5.274 0 0 1 5.285-5.258c1.237 0 2.366.417 3.266 1.17l2.635-2.598A8.985 8.985 0 0 0 11.956 3C7.034 3 3 7.03 3 12s4.034 9 8.956 9c4.527 0 8.362-3.216 8.883-7.456.058-.387.088-.78.088-1.177 0-.588-.06-1.17-.176-1.734z"/></svg>
            Google 登录
        </button>
    </div>

    <!-- 翻译次数 / 状态栏 -->
    <div class="counter-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem;">
            <span style="font-weight: 600; color: #5b21b6;">今日翻译次数</span>
            <span class="trial-badge" id="trialCounter">加载中…</span>
        </div>
        <!-- 翻译卡片 -->
        <div class="translation-box">
            <textarea id="inputText" placeholder="输入文字 (例如: hello world)" rows="2"></textarea>
            <div class="translate-actions">
                <button class="translate-btn" id="translateBtn">翻 译</button>
                <span id="errorMsg" class="error-message"></span>
            </div>
        </div>
        <!-- 输出结果 -->
        <div class="output-area" id="outputText">✨ 翻译结果会出现这里</div>
    </div>

    <!-- 脚注说明 Pro 状态无限制 -->
    <div class="footer-note">
        <span id="proHint">💜 Pro 用户无限次 · 普通用户 3 次</span>
    </div>
</div>

<script>
    (function() {
        // ---------- 1. Supabase 初始化 (CDN 已引入) ----------
        const SUPABASE_URL = 'https://xylrmakgilreaodlnxvx.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_akCwc4tJ9hClqHdi6XcfQ_NpFc7_8a';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ---------- 2. 应用状态 ----------
        let currentUser = null;               // 用户对象
        let proStatus = false;                // 是否 pro (根据用户元数据)
        let usageCount = 0;                   // 本次会话翻译次数 (未登录/pro时重置逻辑)

        // DOM 元素
        const userSection = document.getElementById('userSection');
        const userInfoPlaceholder = document.getElementById('userInfoPlaceholder');
        const googleSignInBtn = document.getElementById('googleSignInBtn');
        const trialCounter = document.getElementById('trialCounter');
        const translateBtn = document.getElementById('translateBtn');
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const errorMsg = document.getElementById('errorMsg');
        const proHint = document.getElementById('proHint');

        // 辅助函数: 更新界面
        function refreshUI() {
            // 更新用户信息区域
            if (currentUser) {
                const user = currentUser;
                const email = user.email || 'Google 用户';
                const name = user.user_metadata?.full_name || email.split('@')[0] || '朋友';
                const avatar = user.user_metadata?.avatar_url;
                // 判断 pro 状态: 假设元数据中 pro: true 表示 pro (可根据业务调整)
                proStatus = user.user_metadata?.pro === true || user.app_metadata?.pro === true || false;
                
                // 构造头像
                let avatarHtml = '';
                if (avatar) {
                    avatarHtml = `<img src="${avatar}" alt="av" style="width:32px; height:32px; border-radius:40px;">`;
                } else {
                    avatarHtml = `<span class="avatar">${name.charAt(0).toUpperCase()}</span>`;
                }

                userInfoPlaceholder.innerHTML = `
                    ${avatarHtml}
                    <span style="display: flex; flex-direction: column; line-height:1.3">
                        <span style="font-weight:600;">${name}</span>
                        <span style="font-size:0.8rem; opacity:0.7;">${email}</span>
                    </span>
                    ${proStatus ? '<span class="badge pro">PRO ✦ 无限</span>' : '<span class="badge">免费版</span>'}
                `;
                googleSignInBtn.style.display = 'none';
            } else {
                // 未登录占位
                userInfoPlaceholder.innerHTML = `<span class="avatar">✨</span><span>未登录，访客模式</span>`;
                googleSignInBtn.style.display = 'inline-flex';
                proStatus = false; // 未登录无pro
            }

            // 更新次数显示与按钮状态 (权限逻辑)
            updateCounterAndButton();
        }

        // 更新计数/按钮的权限逻辑核心
        function updateCounterAndButton() {
            // 如果 proStatus === true: 无限制，显示无限
            if (proStatus) {
                trialCounter.innerText = '✨ PRO 无限次';
                translateBtn.disabled = false;
                translateBtn.classList.remove('disabled');
                errorMsg.innerText = '';     // 清除错误
                proHint.innerText = '💜 Pro 用户 · 无限次数';
                return;
            }

            // 非pro (包含未登录 或 登录但不是pro)
            const maxTrial = 3;
            const remaining = Math.max(0, maxTrial - usageCount);
            trialCounter.innerText = `${remaining} / ${maxTrial} 次`;

            if (remaining <= 0) {
                // 超过限制, 禁用翻译按钮
                translateBtn.disabled = true;
                translateBtn.classList.add('disabled');
                errorMsg.innerText = '⚠️ 试用已达上限，请登录 Pro';
                proHint.innerText = '🔓 登录 Google 获取 Pro 无限次数';
            } else {
                translateBtn.disabled = false;
                translateBtn.classList.remove('disabled');
                errorMsg.innerText = '';
                proHint.innerText = '👤 免费用户剩余 ' + remaining + ' 次';
            }
        }

        // 模拟翻译 (demo)
        function performTranslation(text) {
            if (!text.trim()) return '🐣 输入一些文字吧';
            // 简单mock翻译: 加上 [紫译] 标记
            return `💜 [紫译] ${text}  → (模拟翻译: ${text.split('').reverse().join('')})`;
        }

        // 翻译按钮点击处理
        async function onTranslateClick() {
            // 清除之前错误
            errorMsg.innerText = '';

            // 权限检查 (基于最新状态)
            if (!proStatus) {
                // 非pro 检查剩余次数
                const maxTrial = 3;
                if (usageCount >= maxTrial) {
                    errorMsg.innerText = '❌ 翻译次数用尽，请登录Pro';
                    updateCounterAndButton();
                    return;
                }
            }

            const text = inputText.value;
            if (!text.trim()) {
                outputText.innerText = '🌙 等待输入……';
                return;
            }

            // 执行翻译 (mock)
            const result = performTranslation(text);
            outputText.innerText = result;

            // 只有非pro才增加使用计数 (pro不计数)
            if (!proStatus) {
                usageCount++;
            }

            // 更新界面显示
            updateCounterAndButton();

            // 如果剩余0次 显示更具体
            if (!proStatus && usageCount >= 3) {
                errorMsg.innerText = '⚠️ 3次已用完，登录以继续';
            }
        }

        // ---------- 3. Google 登录 (signInWithOAuth) ----------
        async function signInWithGoogle() {
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin,  // 当前页面地址
                    }
                });
                if (error) throw error;
            } catch (err) {
                console.error('登录错误', err);
                errorMsg.innerText = '登录失败: ' + err.message;
            }
        }

        // ---------- 4. 处理登录状态变更 (监听 auth 变化) ----------
        supabase.auth.onAuthStateChange((event, session) => {
            console.log('Auth event:', event, session);
            if (session?.user) {
                // 登录/刷新
                currentUser = session.user;
                // 重置 usageCount? 保持原来: 切换用户, 重置计数 (新用户重新计算)
                usageCount = 0;   // 新登录重置计数
            } else {
                // 登出/无session
                currentUser = null;
                usageCount = 0;   // 登出重置
            }
            refreshUI();
        });

        // ---------- 5. 初始化: 获取当前session ----------
        async function initAuth() {
            const { data: { session }, error } = await supabase.auth.getSession();
            if (error) {
                console.warn('获取session失败', error);
            }
            if (session?.user) {
                currentUser = session.user;
                usageCount = 0;   // 新加载重置计数 (合理)
            } else {
                currentUser = null;
                usageCount = 0;
            }
            refreshUI();
        }

        // ---------- 6. 监听点击事件 ----------
        googleSignInBtn.addEventListener('click', signInWithGoogle);
        translateBtn.addEventListener('click', onTranslateClick);

        // 可选: 登出功能 (添加一个小按钮，但极简可省略，为了体验添加隐匿退出按钮)
        // 为方便测试，双击用户区域退出 (隐藏功能)
        userSection.addEventListener('dblclick', async () => {
            await supabase.auth.signOut();
            errorMsg.innerText = '已退出';
        });

        // 启动
        initAuth();

        // 额外: 检查URL hash (有些OAuth返回会包含片段, supabase内部处理但保留)
        // 确保界面与状态同步
    })();
</script>

<!-- 附加说明: pro 状态由用户元数据 'pro' 字段控制。为了演示, 可以在 Supabase 手动设置 -->
<!-- 双击用户区域可登出 (隐藏手势)  -->
</body>
</html>
