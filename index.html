<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>LumiTranslate · AI Translator</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
    <!-- Supabase JS (必须头部引入) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ===== 完全保留原有样式，未作任何修改 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            color: #ffffffec;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* breathing light blobs */
        .blob {
            position: fixed;
            width: 35vmax;
            height: 35vmax;
            border-radius: 50%;
            background: rgba(160, 130, 255, 0.15);
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: breathe 14s infinite alternate ease-in-out;
        }
        .blob-1 {
            top: -10vh;
            left: -10vw;
            background: rgba(180, 120, 250, 0.2);
            animation-duration: 18s;
        }
        .blob-2 {
            bottom: -15vh;
            right: -5vw;
            width: 40vmax;
            height: 40vmax;
            background: rgba(140, 90, 255, 0.18);
            animation-duration: 20s;
            animation-delay: -5s;
        }
        .blob-3 {
            top: 40vh;
            right: 20vw;
            width: 30vmax;
            height: 30vmax;
            background: rgba(200, 150, 255, 0.12);
            animation-duration: 22s;
            animation-delay: -2s;
        }
        @keyframes breathe {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            50% { transform: translate(5%, 5%) scale(1.2); opacity: 0.5; }
            100% { transform: translate(-5%, -5%) scale(0.9); opacity: 0.4; }
        }

        /* main glass container */
        .glass-panel {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 1280px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 3rem;
            padding: 2rem 2.2rem 2.5rem;
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            transition: box-shadow 0.3s;
        }

        /* header with crown + auth */
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .logo-icon {
            font-size: 2rem;
            line-height: 1;
            filter: drop-shadow(0 0 6px #c0a0ff);
        }
        .logo-text {
            font-weight: 600;
            font-size: 1.7rem;
            letter-spacing: -0.02em;
            background: linear-gradient(120deg, #ffffff, #e2d5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .action-buttons {
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }

        /* golden crown button */
        .crown-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,215,0,0.25);
            border-radius: 3rem;
            padding: 0.6rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #ffeaa0;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .crown-btn svg {
            width: 20px;
            height: 20px;
            fill: #ffd966;
            color: #ffd966;
            transition: fill 0.2s, filter 0.2s;
        }
        .crown-btn.pro {
            border-color: #ffd966;
            background: rgba(255,215,0,0.08);
            color: #ffdb7c;
            box-shadow: 0 0 15px rgba(255,215,0,0.4);
        }
        .crown-btn.pro svg {
            fill: #ffd966;
            filter: drop-shadow(0 0 6px gold);
        }

        /* google sign button - 保留原样式，ID已修正为google-login */
        .google-btn {
            background: #4285f4;
            border: none;
            border-radius: 40px;
            padding: 0.6rem 1.6rem;
            font-weight: 500;
            font-size: 0.95rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(66,133,244,0.3);
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }
        .google-btn:hover {
            background: #3b77db;
            transform: scale(1.02);
        }
        .google-btn svg {
            width: 18px;
            height: 18px;
        }
        .signout-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            box-shadow: none;
        }
        .signout-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* language row */
        .lang-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .lang-item {
            flex: 1 1 200px;
        }
        .lang-label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.5rem;
            margin-left: 0.5rem;
        }
        .lang-select {
            width: 100%;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 40px;
            padding: 0.9rem 1.5rem;
            color: white;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            transition: 0.2s;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 1.5rem center;
            background-size: 1.2rem;
        }
        .lang-select option {
            background: #1a1730;
            color: white;
        }
        .lang-select:focus {
            border-color: #b088ff;
            box-shadow: 0 0 0 2px rgba(160, 120, 255, 0.4);
        }

        /* main translation area */
        .translation-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.8rem;
            margin-bottom: 2rem;
        }
        .translation-card {
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 2rem;
            padding: 1.5rem 1.5rem 1rem 1.5rem;
            transition: 0.2s;
            min-height: 220px;
            display: flex;
            flex-direction: column;
        }
        .translation-card:focus-within {
            border-color: rgba(180, 130, 255, 0.5);
            box-shadow: 0 0 0 2px rgba(180,130,255,0.2);
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            letter-spacing: 0.4px;
        }
        .textarea-field {
            width: 100%;
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            font-family: "Inter", sans-serif;
            font-weight: 300;
        }
        .textarea-field::placeholder {
            color: rgba(255,255,255,0.25);
            font-weight: 300;
        }
        .char-count {
            text-align: right;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
            margin-top: 0.5rem;
        }

        /* right side typewriter output */
        .typewriter-text {
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* control buttons */
        .action-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.7rem;
            margin-top: 1rem;
        }
        .icon-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(5px);
        }
        .icon-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }
        .icon-btn svg {
            width: 18px;
            height: 18px;
        }
        .translate-main-btn {
            background: #9f7aff;
            border: none;
            border-radius: 2rem;
            padding: 0.7rem 2rem;
            font-weight: 600;
            font-size: 1.1rem;
            color: #0b0820;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(140, 90, 255, 0.4);
            transition: 0.15s;
        }
        .translate-main-btn:hover {
            background: #b18eff;
            transform: scale(1.02);
        }
        .translate-main-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* history */
        .history-section {
            margin-top: 2rem;
        }
        .history-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .history-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .history-chip {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: 0.1s;
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-chip:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(200,160,255,0.3);
        }
        .history-empty {
            color: rgba(255,255,255,0.25);
            font-style: italic;
        }

        /* modal overlay */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 5, 20, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: 0.25s;
        }
        .modal.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-card {
            background: rgba(25, 20, 45, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 3rem;
            padding: 2.2rem 2.5rem;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        .modal-card h2 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff8e7, #d8b5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .modal-card p {
            color: rgba(255,255,255,0.7);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        /* 支付按钮样式 — 同时保留 .pay-link 并新增 .pro-btn 以便脚本识别 */
        .pay-link {
            display: inline-block;
            background: #9f7aff;
            color: #0f0c29;
            font-weight: 700;
            padding: 1rem 2.8rem;
            border-radius: 60px;
            text-decoration: none;
            font-size: 1.2rem;
            box-shadow: 0 10px 25px #7f5ad9;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .pay-link:hover {
            background: #b69cff;
            transform: scale(1.02);
        }
        .modal-close {
            margin-top: 1.8rem;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.5);
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
        }

        /* spinner */
        .spinner {
            display: inline-block;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* responsive */
        @media (max-width: 800px) {
            .translation-grid { grid-template-columns: 1fr; gap: 1rem; }
            .glass-panel { padding: 1.5rem; border-radius: 2rem; }
            .header-row { flex-direction: column; align-items: flex-start; }
            .action-buttons { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>
    <!-- floating purple blobs (breathing light) -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- main glass container -->
    <div class="glass-panel">
        <!-- header with crown + auth -->
        <div class="header-row">
            <div class="logo-area">
                <span class="logo-icon">✨</span>
                <span class="logo-text">LumiTranslate</span>
            </div>
            <div class="action-buttons">
                <!-- crown button -->
                <button class="crown-btn" id="crownBtn">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2" fill="none">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                    <span>PRO</span>
                </button>

                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                    </svg>
                    <span id="authBtnText">Sign in with Google</span>
                </button>
            </div>
        </div>

        <!-- language selector row -->
        <div class="lang-row">
            <div class="lang-item">
                <span class="lang-label">source</span>
                <select class="lang-select" id="sourceLang">
                    <option value="auto" selected>🌐 Auto detect</option>
                    <option value="en">🇬🇧 English</option>
                    <option value="zh">🇨🇳 Chinese</option>
                    <option value="es">🇪🇸 Spanish</option>
                    <option value="fr">🇫🇷 French</option>
                    <option value="de">🇩🇪 German</option>
                </select>
            </div>
            <div class="lang-item">
                <span class="lang-label">target</span>
                <select class="lang-select" id="targetLang">
                    <option value="en">🇬🇧 English</option>
                    <option value="zh" selected>🇨🇳 Chinese</option>
                    <option value="es">🇪🇸 Spanish</option>
                    <option value="fr">🇫🇷 French</option>
                    <option value="de">🇩🇪 German</option>
                </select>
            </div>
        </div>

        <!-- translation grid -->
        <div class="translation-grid">
            <!-- left: input -->
            <div class="translation-card">
                <div class="card-header">
                    <span>INPUT</span>
                    <span id="inputCharCount">0</span>
                </div>
                <textarea id="input-text" class="textarea-field" placeholder="Type or paste text..." rows="5"></textarea>
                <div class="action-bar">
                    <button class="icon-btn" id="clearBtn" title="Clear">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
                        <span>Clear</span>
                    </button>
                </div>
            </div>
            <!-- right: output (typewriter) -->
            <div class="translation-card">
                <div class="card-header">
                    <span>OUTPUT</span>
                    <span id="outputCharCount">0</span>
                </div>
                <div id="output-text" class="textarea-field typewriter-text" style="overflow-y: auto; max-height: 200px;"></div>
                <div class="action-bar">
                    <button class="icon-btn" id="copyBtn" title="Copy translation">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                        <span>Copy</span>
                    </button>
                    <button class="icon-btn" id="shareBtn">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684z"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- translate main button -->
        <div style="display: flex; justify-content: center; margin: 1rem 0 2rem;">
            <button class="translate-main-btn" id="translate-btn">
                <span>Translate</span>
                <span id="translateSpinner" class="spinner" style="display: none;"></span>
            </button>
        </div>

        <!-- history section -->
        <div class="history-section">
            <div class="history-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span>Recent translations</span>
            </div>
            <div id="historyContainer" class="history-items"></div>
            <div id="historyEmpty" class="history-empty">No history yet</div>
        </div>
    </div>

    <!-- Upgrade modal (paywall) 注意：原链接已改为 button，并添加 pro-btn 类 -->
    <div class="modal" id="paywallModal">
        <div class="modal-card">
            <h2>✨ Upgrade to Pro</h2>
            <p>Sign in or get unlimited access for just $2.</p>
            <!-- 关键修改：将 a 替换为 button，保留 pay-link 样式并增加 pro-btn 类，移除 href 和 target -->
            <button id="paymentLink" class="pay-link pro-btn">Continue to payment →</button>
            <div>
                <button class="modal-close" id="closeModalBtn">Close</button>
            </div>
        </div>
    </div>

    <script>

            const outputDiv = document.getElementById('output-text');
            const sourceLang = document.getElementById('sourceLang');
            const targetLang = document.getElementById('targetLang');
            const translateBtn = document.getElementById('translate-btn');
            const spinner = document.getElementById('translateSpinner');
            const clearBtn = document.getElementById('clearBtn');
            const copyBtn = document.getElementById('copyBtn');
            const shareBtn = document.getElementById('shareBtn');
            const inputCharCount = document.getElementById('inputCharCount');

            const historyContainer = document.getElementById('historyContainer');
            const historyEmpty = document.getElementById('historyEmpty');

            // ========== 删除原来给 paymentLink.href 赋值的无效行 (因为现在是 button 没有 href) ==========
            // 原代码: paymentLink.href = 'https://your-payment-link.com';  // 已移除

            // ========== 4. 辅助函数 ==========
            function showPaywall() {
                payModal.classList.add('active');
            }
            function hidePaywall() {
                payModal.classList.remove('active');
            }
            // 更新皇冠样式及按钮样式
            function updateUI() {
                if (currentUser) {
                    // 登录状态
                    authBtnText.innerText = 'Sign Out';
                    googleLoginBtn.classList.add('signout-btn');
                    isPro = true;           // 登录即Pro
                    crownBtn.classList.add('pro');
                } else {
                    authBtnText.innerText = 'Sign in with Google';
                    googleLoginBtn.classList.remove('signout-btn');
                    isPro = false;
                    crownBtn.classList.remove('pro');
                }
            }

            // 更新字符计数
            function updateCounts() {
                inputCharCount.innerText = inputText.value.length;
                outputCharCount.innerText = outputDiv.innerText.length;
            }
            inputText.addEventListener('input', updateCounts);

            // ========== 5. Supabase 登录/登出 ==========
            async function handleGoogleAuth() {
                if (currentUser) {
                    // 登出
                    await supabase.auth.signOut();
                } else {
                    // 登录 - 使用 window.location.origin 保证重定向一致
                    await supabase.auth.signInWithOAuth({
                        provider: 'google',
                        options: { redirectTo: window.location.origin }
                    });
                }
            }
            googleLoginBtn.addEventListener('click', handleGoogleAuth);

            // 监听认证状态变化 (实时更新)
            supabase.auth.onAuthStateChange((event, session) => {
                if (session?.user) {
                    currentUser = session.user;
                } else {
                    currentUser = null;
                }
                updateUI();
            });

            // 页面加载时立即检查当前 session (修复状态丢失)
            supabase.auth.getSession().then(({ data: { session } }) => {
                if (session?.user) {
                    currentUser = session.user;
                } else {
                    currentUser = null;
                }
                updateUI();
            });

            // ========== 6. 翻译核心逻辑 (打字机 + API) ==========
            // 打字机效果
            async function typewriter(text, element, delay = 25) {
                element.innerText = '';
                for (let i = 0; i < text.length; i++) {
                    element.innerText += text[i];
                    await new Promise(r => setTimeout(r, delay));
                }
            }

            // 调用 DeepSeek API
            async function callTranslateAPI(text, src, tgt) {
                const url = 'https://api.deepseek.com/v1/chat/completions';
                const srcMap = { auto: 'auto', en: 'English', zh: 'Chinese', es: 'Spanish', fr: 'French', de: 'German' };
                const tgtMap = { en: 'English', zh: 'Chinese', es: 'Spanish', fr: 'French', de: 'German' };
                const sourceName = srcMap[src] || src;
                const targetName = tgtMap[tgt] || tgt;
                const systemPrompt = `You are a professional translator. Translate from ${sourceName} to ${targetName}. Only output the translated text, no explanations.`;
                const payload = {
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: text }
                    ],
                    temperature: 0.3,
                    max_tokens: 1000
                };
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error(`API error ${response.status}`);
                const data = await response.json();
                const translated = data.choices?.[0]?.message?.content;
                if (!translated) throw new Error('Empty response');
                return translated.trim();
            }

            // 历史记录管理
            const HISTORY_KEY = 'lumitranslate_history';
            function getHistory() {
                try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { return []; }
            }
            function saveHistory(entry) {
                let hist = getHistory();
                hist = hist.filter(h => !(h.source === entry.source && h.target === entry.target));
                hist.unshift(entry);
                if (hist.length > 6) hist = hist.slice(0, 6);
                localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
                renderHistory();
            }
            function renderHistory() {
                const hist = getHistory();
                if (hist.length === 0) {
                    historyContainer.innerHTML = '';
                    historyEmpty.style.display = 'block';
                    return;
                }
                historyEmpty.style.display = 'none';
                let html = '';
                hist.forEach(item => {
                    const preview = (item.source || '').substring(0, 20) + ((item.source || '').length > 20 ? '…' : '');
                    html += `<div class="history-chip" data-src="${encodeURIComponent(JSON.stringify(item))}">${preview}</div>`;
                });
                historyContainer.innerHTML = html;
            }
            // 点击历史恢复
            historyContainer.addEventListener('click', (e) => {
                const chip = e.target.closest('.history-chip');
                if (!chip) return;
                try {
                    const data = JSON.parse(decodeURIComponent(chip.dataset.src));
                    inputText.value = data.source || '';
                    outputDiv.innerText = data.target || '';
                    sourceLang.value = data.sourceLang || 'auto';
                    targetLang.value = data.targetLang || 'zh';
                    updateCounts();
                } catch (err) { console.warn(err); }
            });

            // 翻译按钮点击事件 (核心修复：未登录直接弹窗)
            let isLoading = false;
            translateBtn.addEventListener('click', async () => {
                const text = inputText.value.trim();
                if (!text) return;

                // === 关键修复：未登录直接显示付费墙，不调用API ===
                if (!currentUser) {
                    showPaywall();
                    return;
                }

                // 已登录用户不受免费次数限制（因为 isPro = true）
                // 但保留原有逻辑以防万一（如果以后区分pro状态）
                if (!isPro && freeUsageCount >= FREE_MAX) {
                    showPaywall();
                    return;
                }

                isLoading = true;
                translateBtn.disabled = true;
                spinner.style.display = 'inline-block';

                try {
                    const src = sourceLang.value;
                    const tgt = targetLang.value;
                    const translated = await callTranslateAPI(text, src, tgt);

                    // 打字机输出
                    await typewriter(translated, outputDiv, 25);

                    // 仅当非pro时增加计数（目前登录即pro，所以不会增加）
                    if (!isPro) {
                        freeUsageCount++;
                        localStorage.setItem('free_usage_count', freeUsageCount);
                    }

                    // 保存历史
                    saveHistory({ source: text, target: translated, sourceLang: src, targetLang: tgt });
                    updateCounts();
                } catch (err) {
                    console.error(err);
                    outputDiv.innerText = 'Translation failed. Please retry.';
                } finally {
                    isLoading = false;
                    translateBtn.disabled = false;
                    spinner.style.display = 'none';
                }
            });

            // ========== 7. 其他按钮事件 ==========

            // 清空按钮
            clearBtn.addEventListener('click', () => {
                inputText.value = '';
                outputDiv.innerText = '';
                updateCounts();
                inputText.focus();
            });

            // 复制按钮
            copyBtn.addEventListener('click', async () => {
                if (!outputDiv.innerText) return;
                try {
                    await navigator.clipboard.writeText(outputDiv.innerText);
                    alert('Copied!');
                } catch { alert('Copy failed'); }
            });

            // 分享按钮
            shareBtn.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(window.location.href);
                    alert('Link copied!');
                } catch { alert('Copy failed'); }
            });

            // 关闭支付弹窗逻辑
            closeModalBtn.addEventListener('click', hidePaywall);
            window.addEventListener('click', (e) => {
                if (e.target === payModal) hidePaywall();
            });

            // 皇冠点击也显示支付弹窗
            crownBtn.addEventListener('click', showPaywall);

 // ========== 8. 新增需求：为 .pro-btn 添加点击事件（支付按钮） ==========
 const upgradeBtn = document.querySelector('.pro-btn'); 
            if (upgradeBtn) {
                upgradeBtn.addEventListener('click', async (e) => {
                    e.preventDefault(); 

                    // 1. 检查是否登录
                    const { data: { user } } = await supabase.auth.getUser();

                    if (!user) {
                        alert('Please login first!'); 
                        return;
                    }

                    // 2. 使用新的正式支付链接
                    const baseCheckoutUrl = "https://www.creem.io/payment/prod_2ZSIVKFXTSqLYwUOfyLYdJ";
                    const finalUrl = `${baseCheckoutUrl}?custom_fields[user_id]=${user.id}`;

                    // 3. 在新标签页打开支付页面
                    window.open(finalUrl, '_blank');
                });
            }


            // 初始化历史渲染 & 计数
            renderHistory();
            updateCounts();
        })();
    </script>
</body>
</html>
