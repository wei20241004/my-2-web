<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>LumiTranslate · 极简 AI 翻译</title>
    <!-- Tailwind CSS via CDN + subtle shadow/ring enhancements -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6 (free) for copy/clear icons and minor flair -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- smooth extra style: custom ring, transitions, error toast -->
    <style>
        body {
            background: #f9fafc; /* very light gray-blue SaaS vibe */
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        /* subtle smooth shadows and transitions */
        .card-shadow {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.02), 0 2px 8px rgba(0, 0, 0, 0.02);
            transition: box-shadow 0.2s ease, transform 0.1s ease;
        }
        .card-shadow:focus-within {
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.04), 0 4px 12px rgba(17, 24, 39, 0.05);
        }
        .btn-scale:active {
            transform: scale(0.96);
        }
        /* error toast animation */
        .toast-slide {
            animation: slideDown 0.2s ease-out forwards;
        }
        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        /* custom ring for inputs */
        .input-ring {
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        .input-ring:focus {
            border-color: #1e293b; /* deep slate */
            box-shadow: 0 0 0 3px rgba(30, 41, 59, 0.1);
            outline: none;
        }
        /* history item hover */
        .history-chip {
            transition: all 0.15s;
            background-color: white;
            border: 1px solid #e9edf2;
            color: #1e293b;
        }
        .history-chip:hover {
            background-color: #f1f4f9;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="antialiased text-gray-800 flex items-start justify-center min-h-screen p-4 sm:p-6 md:p-8">

<div class="w-full max-w-6xl">

    <!-- header with subtle SaaS logo / name -->
    <div class="flex items-center justify-between mb-6 sm:mb-8">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-gray-900 rounded-xl flex items-center justify-center shadow-sm">
                <i class="fas fa-sparkles text-white text-sm"></i>
            </div>
            <h1 class="text-xl font-semibold tracking-tight text-gray-800">lumi<span class="text-gray-500">translate</span></h1>
        </div>
        <span class="text-xs text-gray-400 bg-white px-3 py-1.5 rounded-full shadow-sm border border-gray-100">AI · 极简</span>
    </div>

    <!-- error toast container (hidden by default) -->
    <div id="errorToast" class="toast-slide hidden mb-5 w-full bg-red-50 border border-red-200 text-red-700 px-5 py-3.5 rounded-2xl flex items-center gap-3 shadow-md">
        <i class="fas fa-circle-exclamation text-red-400 text-sm"></i>
        <span id="errorMessage" class="text-sm font-medium flex-1">接口异常，请稍后重试</span>
        <button onclick="dismissError()" class="text-red-400 hover:text-red-600 transition">
            <i class="fas fa-times text-sm"></i>
        </button>
    </div>

    <!-- main translation grid: left input / right output -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6 lg:gap-8">

        <!-- LEFT: input card -->
        <div class="bg-white rounded-2xl card-shadow border border-gray-100/80 overflow-hidden flex flex-col h-full">
            <div class="px-5 pt-5 pb-2 flex items-center justify-between">
                <span class="text-xs font-medium text-gray-400 uppercase tracking-wider">原文</span>
                <span class="text-xs text-gray-300 flex items-center gap-1"><i class="far fa-keyboard"></i> EN / 中文</span>
            </div>
            <div class="px-5 pb-2 flex-1">
                <textarea id="inputText" rows="6" placeholder="输入要翻译的文字…" class="w-full resize-none border-0 bg-transparent p-0 text-gray-700 text-base leading-relaxed placeholder:text-gray-300 focus:ring-0 focus:outline-none input-ring rounded-none"></textarea>
            </div>
            <!-- clear button row -->
            <div class="px-5 pb-4 flex justify-end">
                <button id="clearBtn" class="group text-xs text-gray-400 hover:text-gray-700 flex items-center gap-1.5 py-1.5 px-3 rounded-full bg-gray-50 hover:bg-gray-100 transition-all border border-gray-200/60">
                    <i class="far fa-trash-can text-xs group-hover:scale-95 transition-transform"></i>
                    <span>清空</span>
                </button>
            </div>
        </div>

        <!-- RIGHT: output card -->
        <div class="bg-white rounded-2xl card-shadow border border-gray-100/80 overflow-hidden flex flex-col h-full">
            <div class="px-5 pt-5 pb-2 flex items-center justify-between">
                <span class="text-xs font-medium text-gray-400 uppercase tracking-wider">译文</span>
                <span class="text-xs text-gray-300"><i class="far fa-clock"></i> AI 生成</span>
            </div>
            <div class="px-5 pb-2 flex-1">
                <div id="outputText" class="w-full min-h-[6rem] text-gray-700 text-base leading-relaxed whitespace-pre-wrap break-words">
                    <!-- translation will appear here -->
                </div>
                <!-- placeholder when empty -->
                <div id="outputPlaceholder" class="text-gray-300 text-base leading-relaxed">翻译结果会显示在这里</div>
            </div>
            <!-- copy button row -->
            <div class="px-5 pb-4 flex justify-end">
                <button id="copyBtn" class="group text-xs text-gray-400 hover:text-gray-700 flex items-center gap-1.5 py-1.5 px-3 rounded-full bg-gray-50 hover:bg-gray-100 transition-all border border-gray-200/60 disabled:opacity-40 disabled:pointer-events-none">
                    <i class="far fa-copy group-hover:scale-95 transition-transform"></i>
                    <span>复制</span>
                </button>
            </div>
        </div>
    </div>

    <!-- TRANSLATE BUTTON - centered, bold, deep blue/black -->
    <div class="flex justify-center my-8 sm:my-10">
        <button id="translateBtn" class="btn-scale bg-gray-900 hover:bg-gray-800 text-white font-medium px-10 py-4 rounded-2xl shadow-md flex items-center gap-3 transition-all duration-200 border border-gray-700 hover:shadow-lg active:shadow-sm">
            <i class="fas fa-arrow-right-arrow-left text-sm opacity-90"></i>
            <span id="translateBtnText">翻译</span>
        </button>
    </div>

    <!-- RECENT TRANSLATIONS (localStorage) -->
    <div class="mt-8 md:mt-10">
        <div class="flex items-center gap-2 text-gray-400 mb-4">
            <i class="fas fa-history text-sm"></i>
            <span class="text-xs font-medium tracking-wider">最近翻译 · 最多5条</span>
        </div>
        <div id="historyContainer" class="flex flex-wrap gap-2.5">
            <!-- history chips will be injected via js -->
        </div>
        <!-- subtle note when empty -->
        <div id="emptyHistoryNote" class="text-xs text-gray-300 py-2 italic">暂无历史记录，翻译一条试试</div>
    </div>

    <!-- tiny footer / saas credit -->
    <div class="mt-10 text-center text-[0.7rem] text-gray-300 border-t border-gray-100/60 pt-6">
        <span>© 极简翻译 · 数据本地保存</span>
    </div>
</div>

<script>
    (function() {
        // DOM elements
        const inputEl = document.getElementById('inputText');
        const outputEl = document.getElementById('outputText');
        const outputPlaceholder = document.getElementById('outputPlaceholder');
        const translateBtn = document.getElementById('translateBtn');
        const translateBtnText = document.getElementById('translateBtnText');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const errorToast = document.getElementById('errorToast');
        const errorMessage = document.getElementById('errorMessage');
        const historyContainer = document.getElementById('historyContainer');
        const emptyHistoryNote = document.getElementById('emptyHistoryNote');

        // localStorage key
        const STORAGE_KEY = 'lumi_translate_history';
        // max history items
        const MAX_HISTORY = 5;

        // ---------- utils ----------
        function showError(msg) {
            errorMessage.innerText = msg || '接口异常，请稍后重试';
            errorToast.classList.remove('hidden');
            // auto hide after 5 seconds
            setTimeout(() => {
                errorToast.classList.add('hidden');
            }, 5000);
        }

        window.dismissError = function() {
            errorToast.classList.add('hidden');
        };

        // update output content (handles placeholder visibility)
        function setOutputText(text) {
            if (text && text.trim() !== '') {
                outputEl.innerText = text;
                outputPlaceholder.style.display = 'none';
            } else {
                outputEl.innerText = '';
                outputPlaceholder.style.display = 'block';
            }
        }

        // ---------- history management ----------
        function getHistory() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                return [];
            }
        }

        function saveHistory(history) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, MAX_HISTORY)));
        }

        // add a record: { source: '...', target: '...' }  (only if both non-empty)
        function addHistoryRecord(sourceText, translatedText) {
            if (!sourceText || !translatedText || sourceText.trim() === '' || translatedText.trim() === '') return;

            const newRecord = {
                source: sourceText.trim(),
                target: translatedText.trim(),
                timestamp: Date.now()
            };

            let history = getHistory();
            // avoid duplicate consecutive? remove if same source & target exists (optional: remove older identical)
            history = history.filter(item => !(item.source === newRecord.source && item.target === newRecord.target));
            history.unshift(newRecord);  // newest first
            if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
            saveHistory(history);
            renderHistory();
        }

        // render history chips
        function renderHistory() {
            const history = getHistory();
            if (history.length === 0) {
                historyContainer.innerHTML = '';
                emptyHistoryNote.style.display = 'block';
                return;
            }
            emptyHistoryNote.style.display = 'none';
            let html = '';
            history.forEach((item, idx) => {
                // limit display length
                const displayText = item.source.length > 28 ? item.source.substring(0, 26) + '…' : item.source;
                html += `<button class="history-chip rounded-full py-2 px-4 text-xs flex items-center gap-2 shadow-sm" data-source="${item.source.replace(/"/g, '&quot;')}" data-target="${item.target.replace(/"/g, '&quot;')}">
                    <i class="fas fa-rotate-left text-gray-300 text-[0.6rem]"></i>
                    <span class="max-w-[160px] truncate">${displayText}</span>
                </button>`;
            });
            historyContainer.innerHTML = html;

            // attach click event to each chip (fill input)
            document.querySelectorAll('.history-chip').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const source = btn.dataset.source;
                    // const target = btn.dataset.target;  // we don't auto-fill output, only input (UX)
                    if (source) {
                        inputEl.value = source;
                        // optionally we can also fill output? but spec says "快速填回输入框" — only input.
                        // We'll also trigger a small visual feedback: focus input
                        inputEl.focus();
                    }
                });
            });
        }

        // ---------- core translate ----------
        async function performTranslation() {
            const textToTranslate = inputEl.value.trim();
            if (!textToTranslate) {
                showError('请输入要翻译的文字');
                return;
            }

            // disable button, loading state
            translateBtn.disabled = true;
            translateBtnText.innerText = 'Translating...';
            translateBtn.classList.add('opacity-80', 'cursor-not-allowed');

            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textToTranslate })
                });

                if (!response.ok) {
                    let errorMsg = `请求失败 (${response.status})`;
                    try {
                        const errData = await response.json();
                        errorMsg = errData.error || errData.message || errorMsg;
                    } catch (e) {}
                    throw new Error(errorMsg);
                }

                const data = await response.json();
                if (!data.translation) throw new Error('翻译响应格式错误');

                const translated = data.translation;
                setOutputText(translated);

                // save to history (source & target)
                addHistoryRecord(textToTranslate, translated);

                // hide any existing error
                errorToast.classList.add('hidden');

            } catch (err) {
                console.error('Translation error:', err);
                showError(err.message || '翻译接口异常');
                // clear output? we keep previous result maybe, but safer to leave as is? We'll keep but could also set empty. But we keep unchanged.
                // However placeholder logic: if output empty, placeholder shows. no change.
            } finally {
                // re-enable button
                translateBtn.disabled = false;
                translateBtnText.innerText = '翻译';
                translateBtn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        // ---------- copy function ----------
        function copyTranslation() {
            const content = outputEl.innerText;
            if (!content || content.trim() === '') {
                showError('没有可复制的内容');
                return;
            }
            navigator.clipboard.writeText(content).then(() => {
                // optional quick feedback (change copy button text)
                const originalHtml = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="far fa-check-circle"></i><span>已复制</span>';
                copyBtn.classList.add('text-gray-700', 'border-gray-300');
                setTimeout(() => {
                    copyBtn.innerHTML = originalHtml;
                    copyBtn.classList.remove('text-gray-700', 'border-gray-300');
                }, 1500);
            }).catch(() => {
                showError('复制失败，请手动复制');
            });
        }

        // ---------- clear input ----------
        function clearInput() {
            inputEl.value = '';
            // optionally we don't clear output — spec says "一键清空" only input.
            inputEl.focus();
        }

        // ---------- initial load: maybe restore from history but not fill. just render history.----------
        function initialize() {
            renderHistory();
            setOutputText('');  // empty initially

            // Event listeners
            translateBtn.addEventListener('click', performTranslation);
            clearBtn.addEventListener('click', clearInput);
            copyBtn.addEventListener('click', copyTranslation);

            // optional: allow Enter with Ctrl/Cmd? not needed but friendly; we keep simple.

            // input event to hide error toast if typing? (optional)
            inputEl.addEventListener('input', () => {
                // if error visible and user starts typing, maybe dismiss? but we keep as is.
            });

            // disable copy if output empty (gray-out already, but we check inside)
        }

        // run
        initialize();

        // extra: if output is empty, placeholder shows, copy button should be disabled? we disable via pointer-events but also check inside.
        // we can add observer to toggle disabled class on copyBtn
        function updateCopyButtonState() {
            const hasOutput = outputEl.innerText.trim() !== '';
            if (!hasOutput) {
                copyBtn.setAttribute('disabled', 'disabled');
                copyBtn.classList.add('opacity-40', 'pointer-events-none');
            } else {
                copyBtn.removeAttribute('disabled');
                copyBtn.classList.remove('opacity-40', 'pointer-events-none');
            }
        }

        // monitor output changes
        const observer = new MutationObserver(updateCopyButtonState);
        observer.observe(outputEl, { childList: true, characterData: true, subtree: true });
        updateCopyButtonState(); // initial

        // also when setOutputText is used, we trigger via manual call? setOutputText changes innerText, observer catches it.

        // fix setOutputText to also call the observer naturally
        const originalSetOutput = setOutputText;
        window.setOutputText = function(text) {
            originalSetOutput(text);
            updateCopyButtonState();
        };
        // override internal usage
        setOutputText = function(text) {
            outputEl.innerText = text || '';
            if (text && text.trim() !== '') {
                outputPlaceholder.style.display = 'none';
            } else {
                outputPlaceholder.style.display = 'block';
            }
            updateCopyButtonState();
        };

        // make sure our functions are updated
        const originalPerform = performTranslation;
        performTranslation = async function() {
            const textToTranslate = inputEl.value.trim();
            if (!textToTranslate) {
                showError('请输入要翻译的文字');
                return;
            }
            translateBtn.disabled = true;
            translateBtnText.innerText = 'Translating...';
            translateBtn.classList.add('opacity-80', 'cursor-not-allowed');
            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textToTranslate })
                });
                if (!response.ok) {
                    let errorMsg = `请求失败 (${response.status})`;
                    try { const errData = await response.json(); errorMsg = errData.error || errData.message || errorMsg; } catch (e) {}
                    throw new Error(errorMsg);
                }
                const data = await response.json();
                if (!data.translation) throw new Error('翻译响应格式错误');
                const translated = data.translation;
                setOutputText(translated);
                addHistoryRecord(textToTranslate, translated);
                errorToast.classList.add('hidden');
            } catch (err) {
                showError(err.message || '翻译接口异常');
            } finally {
                translateBtn.disabled = false;
                translateBtnText.innerText = '翻译';
                translateBtn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        };

        // rebind listener
        translateBtn.removeEventListener('click', performTranslation);
        translateBtn.addEventListener('click', performTranslation);

        // clear function stays fine
        // copy update
        copyBtn.addEventListener('click', copyTranslation);

        // re-render history after add
        const originalAddHistory = addHistoryRecord;
        addHistoryRecord = function(s, t) {
            if (!s || !t || s.trim() === '' || t.trim() === '') return;
            const newRecord = { source: s.trim(), target: t.trim(), timestamp: Date.now() };
            let history = getHistory();
            history = history.filter(item => !(item.source === newRecord.source && item.target === newRecord.target));
            history.unshift(newRecord);
            if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
            saveHistory(history);
            renderHistory();
        };
        // but we also need to replace the internal reference in performTranslation
        // just for consistency: we'll reassign
        window.addHistoryRecord = addHistoryRecord;
        // in performTranslation, we call addHistoryRecord -> should use updated one (closure ok)
        // we'll just keep as is, since function is redefined.

        // reinitialize to make sure all closures updated
        // rebind
        translateBtn.onclick = performTranslation;
    })();
</script>
</body>
</html>
